server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${CONTEXT_PATH:/api}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          auto: update
        highlight_sql: true
    logging:
      level:
        org.hibernate.tool.schema: DEBUG
        org.hibernate.SQL: DEBUG


  jackson:
    time-zone: ${TIMEZONE:Asia/Ho_Chi_Minh}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  secret: ${JWT_SECRET:lethinguyentrinh}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

